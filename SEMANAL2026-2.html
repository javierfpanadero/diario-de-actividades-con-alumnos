<script>
function activarActualizacionEnlacesThParaTodos() {

        });

function addFiles() {
    var div = event.target.closest(".stickyalumno").nextElementSibling;
    var tables = div.getElementsByClassName("editableTable");
    Array.from(tables).forEach(function(table) {
        var row = table.insertRow(-1);
        var cell1 = row.insertCell(0);
        cell1.innerHTML = "";
        cell1.contentEditable = "true";
    });
    activarActualizacionEnlacesThParaTodos();

// PARA EL NUEVO BOTÓN HIGH
document.getElementById('highButton').addEventListener('click', aplicarHighlight);
function aplicarHighlight() {
   const selection = window.getSelection();
   if (!selection.rangeCount) return;
   // 🔥 Quitar resaltado
   if (highlightColorSeleccionado === 'none') {
       document.execCommand('hiliteColor', false, 'transparent');
       return;
   }
   const color = getHighlightColor(highlightColorSeleccionado);
   if (!color) return;
   // 🔥 Aplicar resaltado
   document.execCommand('hiliteColor', false, color);
}

let highlightColorSeleccionado = 'amarillo';
const highlightOptions = document.getElementById('highlightOptions');

function getHighlightColor(nombre) {
   if (nombre === 'none') return null;
   return getComputedStyle(document.documentElement)
       .getPropertyValue(`--highlight-${nombre}`)
       .trim();
}

function toggleHighlightOptions(event) {
   event.stopPropagation();
   highlightOptions.style.display = highlightOptions.style.display === 'block' ? 'none' : 'block';
}

document.addEventListener('click', () => {
   highlightOptions.style.display = 'none';
});

function setHighlight(color, event) {
   event.stopPropagation();

   highlightColorSeleccionado = color;

   const highButton = document.getElementById('highButton');
   const cssColor = getHighlightColor(color);

   let nombre = (color === 'none') ? 'SIN' : color.toUpperCase();

   highButton.innerHTML = `<b>${nombre}</b>`;

   if (color === 'none') {
       highButton.style.backgroundColor = 'white';
       highButton.style.color = 'black';
   } else {
       highButton.style.backgroundColor = cssColor;
       highButton.style.color = 'black';
   }

   highlightOptions.style.display = 'none';
}
// FIN PARA EL NUEVO BOTÓN HIGH

//INICIO BOTÓN ENLACES
// Detecta el sistema operativo
function getOS() {
  const userAgent = navigator.userAgent.toLowerCase();
  if (userAgent.includes('win')) return 'windows';
  if (userAgent.includes('linux')) return 'linux';
  if (userAgent.includes('mac')) return 'mac';
  return 'unknown';
}

// Normaliza URL para Windows/Linux/Mac
function normalizarURL(url) {
  url = url.trim();
  if (!url) return "";

  // Ya es una URL válida
  if (/^(https?:\/\/|mailto:|tel:|file:\/\/|\/|\.{1,2}\/)/i.test(url)) {
    return url;
  }

  const os = getOS();

  // Windows: C:\carpeta\archivo.pdf → file:///C:/carpeta/archivo.pdf
  if (os === 'windows' && /^[a-zA-Z]:[\\/]/i.test(url)) {
    return "file:///" + url.replace(/\\/g, '/');
  }

  // Windows UNC: \\servidor\carpeta → file://servidor/carpeta
  if (os === 'windows' && /^\\\\/.test(url)) {
    const path = url.slice(2).replace(/\\/g, '/');
    return "file://" + path;
  }

  // Linux/Mac: /home/usuario/archivo.pdf → file:///home/usuario/archivo.pdf
  if ((os === 'linux' || os === 'mac') && /^\//.test(url)) {
    return "file://" + url;
  }

  // Ruta relativa (funciona en todos)
  if (/^\.{1,2}[\/\\]/.test(url)) {
    return url.replace(/\\/g, '/');
  }

  // Asumir web
  return "https://" + url;
}

// Función principal ENLACE
function insertarEnlace() {
  const sel = window.getSelection();
  let texto = "";

  // Usa texto seleccionado automáticamente
  if (sel.rangeCount > 0 && !sel.getRangeAt(0).collapsed) {
    texto = sel.toString().trim();
  }

  if (!texto) {
    texto = prompt("Texto del enlace:");
    if (texto === null) return;
    texto = texto.trim();
    if (!texto) {
      alert("El texto no puede estar vacío.");
      return;
    }
  }

  const os = getOS();
  const ejemplos = os === 'windows' 
    ? "Ej: https://ejemplo.com\nC:\\Docs\\examen.pdf\n../archivo.pdf\n\\\\servidor\\docs"
    : "Ej: https://ejemplo.com\n/home/usuario/examen.pdf\n./archivo.pdf";

  const url = prompt("URL del enlace:\n" + ejemplos);
  if (url === null) return;

  const urlLimpia = normalizarURL(url);
  if (!urlLimpia) {
    alert("URL inválida.");
    return;
  }

  // Estilo consistente con tu página
  const enlace = `<a href="${urlLimpia}" target="_blank" rel="noopener noreferrer" style="color:#2196f3 !important;font-weight:bold;text-decoration:underline;">${texto}</a>`;
  insertarHTMLEnSeleccionOEnCelda(enlace);
}

// Insertar en celda/selección
function insertarHTMLEnSeleccionOEnCelda(html) {
  const sel = window.getSelection();

  if (sel.rangeCount > 0) {
    document.execCommand("insertHTML", false, html);
    return;
  }

  const activo = document.activeElement;
  const celda = activo.closest ? activo.closest("td, th, [contenteditable='true']") : null;
  if (celda && celda.isContentEditable) {
    celda.focus();
    const range = document.createRange();
    range.selectNodeContents(celda);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
    document.execCommand("insertHTML", false, html);
    return;
  }

  alert("Pon el cursor en una celda editable o selecciona texto primero.");
}

document.getElementById('saveButton').addEventListener('click', function() {
    const pageContent = document.documentElement.outerHTML;
    const blob = new Blob([pageContent], {type: 'text/html'});
    const link = document.createElement('a');
    const now = new Date();
    const date = now.toISOString().slice(0,10);
    const time = now.toTimeString().slice(0,8).replace(/:/g, '-');
    const fileName = `DIARIO_${date}_${time}.html`;
    link.href = URL.createObjectURL(blob);
    link.download = fileName;
    link.click();
    URL.revokeObjectURL(link.href);
});

function activarActualizacionEnlacesTh(nombreAlumno) {
    const alumnoContainer = document.querySelector(`.alumnoContainer[data-alumno="${nombreAlumno}"]`);

    alumnoContainer.querySelectorAll('.editableTable th[contenteditable="true"]').forEach(th => {
        th.oninput = () => actualizarEnlacesAsignaturas(nombreAlumno);
    });
}
function actualizarNombreEnCaja(nombreAlumno) {
    const alumnoContainer = document.querySelector(`.alumnoContainer[data-alumno="${nombreAlumno}"]`);
    if (!alumnoContainer) return;
    const nombreCelda = alumnoContainer.querySelector('td[contenteditable="true"]');
    if (!nombreCelda) return;
    let texto = nombreCelda.innerHTML.split(/<br\s*\/?>|\n/)[0].trim();
    const itemDiv = document.getElementById(`item-${nombreAlumno}`);
    if (itemDiv) itemDiv.querySelector('.nombre-alumno-editable').textContent = texto;
}
function actualizarNombreEnCabecera(nombreAlumno, editableDiv) {

    const alumnoContainer = document.querySelector(`.alumnoContainer[data-alumno="${nombreAlumno}"]`);
    if (alumnoContainer) {
        const nombreCelda = alumnoContainer.querySelector('td[contenteditable="true"]');
        if (nombreCelda) {
            let lineas = nombreCelda.innerHTML.split(/<br\s*\/?>|\n/);
            lineas[0] = nuevaLinea;
            nombreCelda.innerHTML = lineas.join('<br>');

function actualizarEnlacesAsignaturas(nombreAlumno) {
  const alumnoContainer = document.querySelector(`[data-alumno="${nombreAlumno}"]`);
  const itemDiv = document.getElementById(`item-${nombreAlumno}`);
  if (!alumnoContainer || !itemDiv) return;

  const tablas = alumnoContainer.querySelectorAll('.editableTable');
  if (tablas.length < 2) {
    itemDiv.querySelectorAll('.columna-enlaces').forEach(col => col.innerHTML = '');
    return;
  }

  // --- CAMBIO: Tomar TODAS las tablas desde la primera ---
  const tablasEnlazar = Array.from(tablas);
  // Reasignar IDs en orden visual
  tablasEnlazar.forEach((tabla, i) => {
    tabla.id = `${nombreAlumno}-asig-${i + 2}`;
  });

  const enlaces = tablasEnlazar.map((tabla, i) => {
    let th = tabla.querySelector('th');
    let thText = th ? th.innerHTML : `Asignatura ${i + 2}`;
    let nombre = thText.split('<br>')[0].trim();
    return `<a href="#${tabla.id}" style="text-decoration: underline; color: #2196f3; font-weight: bold;">${nombre}</a>`;
  });

  // --- CAMBIO: Repartir automáticamente en 2 columnas ---
  const mitad = Math.ceil(enlaces.length / 2);
  const col1 = enlaces.slice(0, mitad).join('<br>');
  const col2 = enlaces.slice(mitad).join('<br>');

  const columnas = itemDiv.querySelectorAll('.columna-enlaces');
  if (columnas.length >= 2) {
    columnas[0].innerHTML = col1;
    columnas[1].innerHTML = col2;
  }
}

}

(function() {
    function updateStickyElements() {
        document.querySelectorAll('.alumnoBlock').forEach(block => {
            const stickyAlumno = block.querySelector('.stickyalumno');
            const thead = block.querySelector('.editableTable thead');
            if (stickyAlumno && thead) {
                const stickyAlumnoHeight = stickyAlumno.offsetHeight;
                block.style.setProperty('--stickyalumno-height', `${stickyAlumnoHeight}px`);
                thead.style.top = `var(--stickyalumno-height, 0px)`;
            }
        });
    }
    function setupResizeObserver() {
        const resizeObserver = new ResizeObserver(entries => {
            for (let entry of entries) {
                const alumnoBlock = entry.target.closest('.alumnoBlock');
                if (alumnoBlock) updateStickyElements();
            }
        });
        document.querySelectorAll('.stickyalumno').forEach(stickyAlumno => resizeObserver.observe(stickyAlumno));
    }
    function initializeScript() {
        updateStickyElements();
        setupResizeObserver();
    }
    initializeScript();
    window.addEventListener('resize', updateStickyElements);
    window.addEventListener('load', initializeScript);
    new MutationObserver(mutations => {
        mutations.forEach(mutation => {
            if (mutation.type === 'childList') initializeScript();
        });
    }).observe(document.body, { childList: true, subtree: true });
})();

function borrarFila() {
    if (!confirm("¿Estás seguro de que deseas borrar esta FILA?")) return;
    let selection = window.getSelection();
    if (!selection.rangeCount) { alert("No hay selección activa."); return; }
    let node = selection.getRangeAt(0).commonAncestorContainer;
    while (node && node.nodeType !== 1) node = node.parentNode;
    let row = node.closest("tr");
    if (row && row.parentNode && row.parentNode.tagName === "TBODY") row.remove();
    else alert("No se encontró una fila válida para borrar.");
}
function ponerFocoEnFila(fila, celdaIndex) {
    let celdas = fila.querySelectorAll('td[contenteditable="true"]');
    if (celdas.length === 0) return;
    let celda = celdas[celdaIndex] || celdas[0];
    let range = document.createRange();
    range.selectNodeContents(celda);
    range.collapse(true);
    let sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    celda.focus();
}
function ponerFocoEnPrimeraCelda(elemento) {
    let celda = elemento.querySelector('td[contenteditable="true"], [contenteditable="true"]:not(td)');
    if (celda) {
        let range = document.createRange();
        range.selectNodeContents(celda);
        range.collapse(true);
        let sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        celda.focus();
    }
}
function moverAdelante() {
    let selection = window.getSelection();
    if (!selection.rangeCount) {
        alert("No hay selección activa.");
        return;
    }
    let node = selection.getRangeAt(0).commonAncestorContainer;
    if (node.nodeType === Node.TEXT_NODE) node = node.parentNode;
    let fila = node.closest('tr');
    let tablaAsignatura = node.closest('.editableTable');
    if (fila && tablaAsignatura && fila.parentNode && fila.parentNode.tagName === "TBODY") {
        let tbody = fila.parentNode;
        if (tbody.children.length > 1) {
            let anterior = fila.previousElementSibling;
            if (anterior) {
                let celdas = Array.from(fila.querySelectorAll('td[contenteditable="true"]'));
                let focused = document.activeElement;
                let celdaIndex = celdas.indexOf(focused);
                tbody.insertBefore(fila, anterior);
                setTimeout(() => ponerFocoEnFila(fila, celdaIndex), 10);
            }
        }
        return;
    }
    let th = node.closest('th');
    if (th && th.closest('.editableTable')) {
        let tabla = th.closest('.editableTable');
        let anterior = tabla.previousElementSibling;
        if (anterior) {
            tabla.parentNode.insertBefore(tabla, anterior);
            setTimeout(() => ponerFocoEnPrimeraCelda(tabla), 10);
            // --- PARCHE: Actualizar enlaces tras mover tabla ---
            activarActualizacionEnlacesThParaTodos();
            document.querySelectorAll('.alumnoContainer').forEach(alumnoContainer => {
                const nombreAlumno = alumnoContainer.getAttribute('data-alumno');
                actualizarEnlacesAsignaturas(nombreAlumno);
            });
        }
        return;
    }
    let tablaCabecera = node.closest('table');
    if (tablaCabecera && !tablaCabecera.classList.contains('editableTable')) {
        let alumnoContainer = tablaCabecera.closest('.alumnoContainer');
        if (alumnoContainer) {
            let anterior = alumnoContainer.previousElementSibling;
            if (anterior) {
                alumnoContainer.parentNode.insertBefore(alumnoContainer, anterior);
                let nombre = alumnoContainer.getAttribute('data-alumno');
                let item = document.getElementById(`item-${nombre}`);
                if (item) {
                    let itemAnterior = item.previousElementSibling;
                    if (itemAnterior) item.parentNode.insertBefore(item, itemAnterior);
                }
                setTimeout(() => ponerFocoEnPrimeraCelda(alumnoContainer), 10);
                // --- PARCHE: Actualizar enlaces tras mover alumno ---
                activarActualizacionEnlacesThParaTodos();
                document.querySelectorAll('.alumnoContainer').forEach(alumnoContainer => {
                    const nombreAlumno = alumnoContainer.getAttribute('data-alumno');
                    actualizarEnlacesAsignaturas(nombreAlumno);
                });
            }
            return;
        }
    }
    let alumnoContainer = node.closest('.alumnoContainer');
    if (alumnoContainer && !node.closest('.editableTable')) {
        let anterior = alumnoContainer.previousElementSibling;
        if (anterior) {
            alumnoContainer.parentNode.insertBefore(alumnoContainer, anterior);
            let nombre = alumnoContainer.getAttribute('data-alumno');
            let item = document.getElementById(`item-${nombre}`);
            if (item) {
                let itemAnterior = item.previousElementSibling;
                if (itemAnterior) item.parentNode.insertBefore(item, itemAnterior);
            }
            setTimeout(() => ponerFocoEnPrimeraCelda(alumnoContainer), 10);
            // --- PARCHE: Actualizar enlaces tras mover alumno ---
            activarActualizacionEnlacesThParaTodos();
            document.querySelectorAll('.alumnoContainer').forEach(alumnoContainer => {
                const nombreAlumno = alumnoContainer.getAttribute('data-alumno');
                actualizarEnlacesAsignaturas(nombreAlumno);
            });
        }
        return;
    }
    let item = node.closest('.item');
    if (item) {
        let anterior = item.previousElementSibling;
        if (anterior) {
            item.parentNode.insertBefore(item, anterior);
            let nombre = item.id.replace('item-', '');
            let alumnoContainer = document.querySelector(`.alumnoContainer[data-alumno="${nombre}"]`);
            if (alumnoContainer) {
                let alumnoAnterior = alumnoContainer.previousElementSibling;
                if (alumnoAnterior) alumnoContainer.parentNode.insertBefore(alumnoContainer, alumnoAnterior);
            }
            setTimeout(() => ponerFocoEnPrimeraCelda(item), 10);
            // --- PARCHE: Actualizar enlaces tras mover item ---
            activarActualizacionEnlacesThParaTodos();
            document.querySelectorAll('.alumnoContainer').forEach(alumnoContainer => {
                const nombreAlumno = alumnoContainer.getAttribute('data-alumno');
                actualizarEnlacesAsignaturas(nombreAlumno);
            });
        }
        return;
    }
    alert("No se encontró un elemento válido para mover. Selecciona una tabla, fila de tabla, nombre de alumno o un enlace.");
}
